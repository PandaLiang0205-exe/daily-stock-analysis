name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/dsa-web
        run: npm ci

      - name: Build frontend
        working-directory: apps/dsa-web
        env:
          # Railway 後端 API 網址
          VITE_API_URL: https://daily-stock-analysis-production.up.railway.app
          # GitHub Pages 子路徑
          VITE_BASE_PATH: /daily-stock-analysis/
        run: npm run build

      - name: Add SPA routing support (404.html)
        run: |
          cat > static/404.html << 'EOF'
          <!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Daily Stock Analysis</title>
            <script>
              // GitHub Pages SPA redirect trick
              // Encodes the path and redirects to index.html with it as a query param
              var segmentCount = 1;
              var l = window.location;
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + segmentCount).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(segmentCount).join('/').replace(/&/g, '~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g, '~and~') : '') +
                l.hash
              );
            </script>
          </head>
          <body></body>
          </html>
          EOF

      - name: Patch index.html for SPA routing
        run: |
          SCRIPT='<script>
          (function(l){
            if(l.search[1]==="/"){
              var d=l.search.slice(1).split("&").map(function(s){return s.replace(/~and~/g,"&")});
              window.history.replaceState(null,null,l.pathname.slice(0,-1)+d[0]+(d[1]?"&"+d[1].slice(1):"")+l.hash);
            }
            if(l.search.startsWith("?p=")){
              var path=l.search.slice(3).split("&")[0];
              window.history.replaceState(null,null,l.pathname+path+l.hash);
            }
          }(window.location));
          </script>'
          sed -i "s|</head>|${SCRIPT}</head>|" static/index.html

      - name: Add .nojekyll
        run: touch static/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          publish_branch: gh-pages
