name: Deploy Frontend to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: apps/dsa-web/package-lock.json

      - name: Install frontend dependencies
        working-directory: apps/dsa-web
        run: npm ci

      - name: Build frontend
        working-directory: apps/dsa-web
        env:
          # Railway 後端 API 網址
          VITE_API_URL: https://daily-stock-analysis-production.up.railway.app
          # GitHub Pages 子路徑
          VITE_BASE_PATH: /daily-stock-analysis/
        run: npm run build

      - name: Add SPA routing support for GitHub Pages
        run: |
          python3 - << 'PYEOF'
          import pathlib

          # 404.html: 把路徑編碼後重定向到首頁
          html_404 = """<!DOCTYPE html>
          <html>
          <head>
            <meta charset="utf-8">
            <title>Daily Stock Analysis</title>
            <script>
              var seg = 1;
              var l = window.location;
              l.replace(
                l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
                l.pathname.split('/').slice(0, 1 + seg).join('/') + '/?p=/' +
                l.pathname.slice(1).split('/').slice(seg).join('/').replace(/&/g,'~and~') +
                (l.search ? '&q=' + l.search.slice(1).replace(/&/g,'~and~') : '') +
                l.hash
              );
            </script>
          </head>
          <body></body>
          </html>"""
          pathlib.Path('static/404.html').write_text(html_404, encoding='utf-8')

          # 在 index.html 的 </head> 前插入還原路徑的腳本
          spa_script = """<script>
          (function(l){
            if(l.search.startsWith('?p=/')){
              var parts=l.search.slice(1).split('&');
              var path=parts[0].slice(2).replace(/~and~/g,'&');
              var qs=parts[1]?'?'+parts[1].slice(2).replace(/~and~/g,'&'):'';
              window.history.replaceState(null,null,l.pathname+path+qs+l.hash);
            }
          }(window.location));
          </script>"""

          idx = pathlib.Path('static/index.html')
          content = idx.read_text(encoding='utf-8')
          idx.write_text(content.replace('</head>', spa_script + '</head>', 1), encoding='utf-8')
          print('SPA routing files written successfully.')
          PYEOF

      - name: Add .nojekyll
        run: touch static/.nojekyll

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./static
          publish_branch: gh-pages
